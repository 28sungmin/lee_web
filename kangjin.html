<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300&amp;display=swap" rel="stylesheet">
    <title>강진 여행</title>
    <style>
        * {
            font-family: 'Noto Sans KR', sans-serif;
            list-style: none;
            border-collapse: collapse;
            margin: 0px;
            padding: 0px;
        }

        body {
            margin: 0px;
        }

        .place {
            list-style-type: none;
            text-decoration: none;
            margin: 0;
            padding-top: 100px;
            width: 20%;
            background-color: lightgray;
            position: fixed;
            height: 100%;
            overflow: auto;
        }

        li {
            margin-top: 30px;
        }

        li a {
            display: block;
            padding: 8px 16px;
            /* top과 bottom이 8px, left와 right가 16px */
            text-decoration: none;
            text-align: center;
            font-size: 20px;
            color: black;
        }

        li a:hover {
            background-color: gray;
        }

        /* icon */
        .icon {
            text-align: center;
            margin-bottom: 30px;
        }

        .wrap {
            margin-left: 20%;
            padding: 1px 16px;
            height: 1000px;
        }

        h1 {
            font-size: 40px;
        }

        h3 {
            font-size: 35px;
            animation-name: travel;
            animation-duration: 5s;
            animation-iteration-count: infinite;
        }

        /* 애니메이션 효과 */
        @keyframes travel {
            0% {
                color: blue;
            }

            30% {
                color: green;
            }

            100% {
                color: red;
            }
        }

        .sub {
            margin-top: 70px;
        }
    </style>
</head>
